server {
    listen 80;
    server_name _;

    # Empêche Nginx de reconstruire des URLs absolues avec le mauvais port
    # (important derrière un reverse proxy sur port non-standard)
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long terme pour les assets versionnés (JS/CSS/images avec hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Toutes les autres routes → Astro gère les pages statiques
    # $uri/index.html évite le redirect 301 sur les dossiers (problème derrière reverse proxy)
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
